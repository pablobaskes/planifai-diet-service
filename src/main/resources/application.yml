spring:
  application:
  name: diet-service
  server:
  port: 8083
  datasource:
    url: jdbc:postgresql://localhost:5432/diet_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    url: /diet-openapi.yml
    path: /swagger-ui.html